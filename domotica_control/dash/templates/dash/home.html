<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #080b10;
            --panel: #111822;
            --panel-soft: #172230;
            --line: #263446;
            --text: #eef4ff;
            --muted: #92a1b5;
            --blue: #60a5fa;
            --green: #34d399;
            --amber: #fbbf24;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(96, 165, 250, 0.16), transparent 32rem),
                radial-gradient(circle at bottom right, rgba(52, 211, 153, 0.10), transparent 28rem),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .dashboard {
            width: min(1180px, 100%);
            margin: 0 auto;
            padding: 28px;
        }

        .topbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 4.2rem);
            line-height: 0.98;
            letter-spacing: 0;
        }

        .status-strip {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(17, 24, 34, 0.74);
            color: var(--muted);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 18px var(--green);
        }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .device-window {
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            border: 1px solid rgba(146, 161, 181, 0.2);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 34%),
                var(--panel);
            box-shadow: var(--shadow);
        }

        .device-window[data-active="false"] {
            opacity: 0.72;
        }

        .window-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .device-name {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0;
        }

        .device-location {
            margin: 5px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .icon-badge {
            flex: 0 0 auto;
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            color: var(--text);
            font-size: 1.4rem;
        }

        .metric {
            margin: 32px 0;
        }

        .metric-value {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: clamp(3.1rem, 8vw, 5.4rem);
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: 0;
        }

        .metric-unit {
            color: var(--muted);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .metric-label {
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .progress-track {
            height: 9px;
            overflow: hidden;
            border-radius: 999px;
            background: #0b1119;
            border: 1px solid rgba(146, 161, 181, 0.12);
        }

        .progress-fill {
            height: 100%;
            width: var(--level);
            border-radius: inherit;
            background: var(--accent);
            box-shadow: 0 0 24px var(--accent);
            transition: width 180ms ease;
        }

        .readings {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin: 18px 0;
        }

        .reading {
            min-height: 70px;
            padding: 12px;
            border-radius: 8px;
            background: #0d131d;
            border: 1px solid rgba(146, 161, 181, 0.14);
        }

        .reading span {
            display: block;
            color: var(--muted);
            font-size: 0.78rem;
        }

        .reading strong {
            display: block;
            margin-top: 8px;
            font-size: 1.05rem;
        }

        .accent-blue {
            --accent: var(--blue);
        }

        .accent-green {
            --accent: var(--green);
        }

        .accent-amber {
            --accent: var(--amber);
        }

        @media (max-width: 920px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .status-strip {
                justify-content: flex-start;
            }

            .device-grid {
                grid-template-columns: 1fr;
            }

            .device-window {
                min-height: 360px;
            }
        }

        @media (max-width: 560px) {
            .dashboard {
                padding: 18px;
            }

            .status-strip {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr;
            }

            .pill {
                justify-content: space-between;
                width: 100%;
            }

            .device-window {
                padding: 16px;
            }

            .readings {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>
<body>
    <main class="dashboard">
        <header class="topbar">
            <div>
                <h1>Smart Home</h1>
            </div>

            <div class="status-strip" aria-label="Home status summary">
                <div class="pill"><span class="dot"></span>All systems online</div>
            </div>
        </header>

        <section class="device-grid" aria-label="Device dashboard">
            <article class="device-window accent-blue" data-active="true">
                <div>
                    <div class="window-header">
                        <div>
                            <h2 class="device-name">Living Room Lights</h2>
                            <p class="device-location">Ground floor</p>
                        </div>
                        <div class="icon-badge" aria-hidden="true">L</div>
                    </div>

                    <div class="metric">
                        <div class="metric-value">
                            <span class="js-level">72</span><span class="metric-unit">%</span>
                        </div>
                        <p class="metric-label">Current brightness</p>
                    </div>

                    <div class="progress-track" aria-hidden="true">
                        <div class="progress-fill" style="--level: 72%;"></div>
                    </div>

                    <div class="readings">
                        <div class="reading">
                            <span>Scene</span>
                            <strong>Evening</strong>
                        </div>
                        <div class="reading">
                            <span>Color</span>
                            <strong>Warm white</strong>
                        </div>
                    </div>
                </div>

            </article>

            <article class="device-window accent-green" data-active="true">
                <div>
                    <div class="window-header">
                        <div>
                            <h2 class="device-name">Thermostat</h2>
                            <p class="device-location">Hallway</p>
                        </div>
                        <div class="icon-badge" aria-hidden="true">T</div>
                    </div>

                    <div class="metric">
                        <div class="metric-value">
                            <span class="js-level">21.5</span><span class="metric-unit">C</span>
                        </div>
                        <p class="metric-label">Target temperature</p>
                    </div>

                    <div class="progress-track" aria-hidden="true">
                        <div class="progress-fill" style="--level: 58%;"></div>
                    </div>

                    <div class="readings">
                        <div class="reading">
                            <span>Humidity</span>
                            <strong>48%</strong>
                        </div>
                        <div class="reading">
                            <span>Mode</span>
                            <strong>Auto</strong>
                        </div>
                    </div>
                </div>

            </article>

            <article class="device-window accent-amber" data-active="false">
                <div>
                    <div class="window-header">
                        <div>
                            <h2 class="device-name">Security Camera</h2>
                            <p class="device-location">Front door</p>
                        </div>
                        <div class="icon-badge" aria-hidden="true">C</div>
                    </div>

                    <div class="metric">
                        <div class="metric-value">
                            <span class="js-level">Idle</span>
                        </div>
                        <p class="metric-label">Motion detection</p>
                    </div>

                    <div class="progress-track" aria-hidden="true">
                        <div class="progress-fill" style="--level: 22%;"></div>
                    </div>

                    <div class="readings">
                        <div class="reading">
                            <span>Last event</span>
                            <strong>22:14</strong>
                        </div>
                        <div class="reading">
                            <span>Signal</span>
                            <strong>Strong</strong>
                        </div>
                    </div>
                </div>

            </article>
        </section>
    </main>
</body>
</html>
