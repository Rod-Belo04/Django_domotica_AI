<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #080b10;
            --panel: #111822;
            --panel-soft: #172230;
            --line: #263446;
            --text: #eef4ff;
            --muted: #92a1b5;
            --blue: #60a5fa;
            --green: #34d399;
            --amber: #fbbf24;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(96, 165, 250, 0.16), transparent 32rem),
                radial-gradient(circle at bottom right, rgba(52, 211, 153, 0.10), transparent 28rem),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .dashboard {
            width: min(1180px, 100%);
            margin: 0 auto;
            padding: 28px;
        }

        .topbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 4.2rem);
            line-height: 0.98;
            letter-spacing: 0;
        }

        .status-strip {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(17, 24, 34, 0.74);
            color: var(--muted);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 18px var(--green);
        }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .device-window {
            min-height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            border: 1px solid rgba(146, 161, 181, 0.2);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 34%),
                var(--panel);
            box-shadow: var(--shadow);
        }

        .window-header {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 12px;
            text-align: center;
        }

        .device-name {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0;
        }

        .data_value {
            margin: 128px 0 0;
            font-size: clamp(3.2rem, 8vw, 5.2rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0;
        }

        .accent-blue {
            --accent: var(--blue);
        }

        .accent-green {
            --accent: var(--green);
        }

        .accent-amber {
            --accent: var(--amber);
        }

        .curtain-controller {
            display: grid;
            grid-template-columns: 120px minmax(0, 1fr);
            align-items: center;
            gap: 34px;
            width: min(760px, 100%);
            min-height: 260px;
            margin-top: 20px;
            padding: 28px 34px;
            border: 1px solid rgba(146, 161, 181, 0.2);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 34%),
                var(--panel);
            box-shadow: var(--shadow);
        }

        .curtain-slider-wrap {
            display: grid;
            place-items: center;
            min-height: 210px;
        }

        .curtain-slider {
            width: 210px;
            accent-color: var(--blue);
            transform: rotate(-90deg);
            cursor: pointer;
        }

        .curtain-copy {
            min-width: 0;
        }

        .curtain-copy h2 {
            margin: 0;
            font-size: clamp(1.7rem, 4vw, 2.8rem);
            line-height: 1.05;
            letter-spacing: 0;
        }

        .curtain-copy p {
            margin: 34px 0 0;
            color: var(--muted);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .curtain-status {
            color: var(--text);
        }

        .csrf-token-holder {
            display: none;
        }

        @media (max-width: 920px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .status-strip {
                justify-content: flex-start;
            }

            .device-grid {
                grid-template-columns: 1fr;
            }

            .device-window {
                min-height: 360px;
            }

            .curtain-controller {
                grid-template-columns: 96px minmax(0, 1fr);
                gap: 22px;
            }
        }

        @media (max-width: 560px) {
            .dashboard {
                padding: 18px;
            }

            .status-strip {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr;
            }

            .pill {
                justify-content: space-between;
                width: 100%;
            }

            .device-window {
                padding: 16px;
            }

            .data_value {
                margin-top: 96px;
            }

            .curtain-controller {
                grid-template-columns: 1fr;
                justify-items: center;
                min-height: auto;
                padding: 22px 18px 28px;
                text-align: center;
            }

            .curtain-slider-wrap {
                min-height: 190px;
            }

            .curtain-copy p {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <main class="dashboard">
        <header class="topbar">
            <div>
                <h1>Dash Monitoraggio e controllo</h1>
            </div>

            <div class="status-strip" aria-label="Home status summary">
                <div class="pill"><span class="dot"></span>Tutti i sistemi online</div>
            </div>
        </header>

        <section class="device-grid" aria-label="Device dashboard">
            <article class="device-window accent-blue">
                <div class="window-header">
                    <h2 class="device-name">temperatura</h2>
                </div>
                <div class="data_value">{{ ult_temp.Temperatura }}</div>
            </article>

            <article class="device-window accent-green">
                <div class="window-header">
                    <h2 class="device-name">consumo energetico</h2>
                </div>
                <div class="data_value">{{ ult_ConsumoElettrico.Consumo }} Kw</div>
            </article>

            <article class="device-window accent-amber">
                <div class="window-header">
                    <h2 class="device-name">Ultima irrigazione</h2>
                </div>
                <div class="data_value">{{ ult_Irrigazione.Data|date:"d/m H:i" }}</div>
            </article>
        </section>

        <section
            class="curtain-controller"
            aria-label="Controllo globale tapparelle"
            data-post-url="/INSERIRE-URL-CONTROLLO-TAPPARELLE/"
        >
            <form class="csrf-token-holder">
                {% csrf_token %}
            </form>

            <div class="curtain-slider-wrap">
                <input
                    class="curtain-slider"
                    id="curtain-position"
                    type="range"
                    min="0"
                    max="100"
                    value="30"
                    aria-label="Posizione tapparelle"
                >
            </div>

            <div class="curtain-copy">
                <h2>controllo globale tapparelle</h2>
                <p>Posizione attuale: <span class="curtain-status" id="curtain-status">30%</span></p>
            </div>
        </section>
    </main>

    <script>
        const curtainController = document.querySelector(".curtain-controller");
        const curtainSlider = document.querySelector("#curtain-position");
        const curtainStatus = document.querySelector("#curtain-status");
        const csrfToken = document.querySelector("[name=csrfmiddlewaretoken]");

        function getCookie(name) {
            const cookie = document.cookie
                .split("; ")
                .find((row) => row.startsWith(`${name}=`));

            return cookie ? decodeURIComponent(cookie.split("=")[1]) : "";
        }

        function updateCurtainStatus() {
            curtainStatus.textContent = `${curtainSlider.value}%`;
        }

        function sendCurtainPosition() {
            fetch(curtainController.dataset.postUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": csrfToken ? csrfToken.value : getCookie("csrftoken"),
                },
                body: new URLSearchParams({
                    position: curtainSlider.value,
                }),
            }).catch(() => {
                console.error("Curtain controller POST failed.");
            });
        }

        curtainSlider.addEventListener("input", updateCurtainStatus);
        curtainSlider.addEventListener("change", sendCurtainPosition);
    </script>
</body>
</html>
